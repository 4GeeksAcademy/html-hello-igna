<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Instagram Post</title>


  <link rel="stylesheet" href="styles.css">


  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="post">


    <div class="post-header">
      <div class="header-left">
        <i class="fa-brands fa-html5"></i>
        <div class="user">
          <strong>HTML5</strong>
          <p>En algun lugar del mundo</p>
        </div>
      </div>
      <div class="header-right">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </div>
    </div>

    
    <div class="post-img">
      <img src="https://1.bp.blogspot.com/-UjQ6jBM3_lo/VzVAsI9exTI/AAAAAAADBi4/FnFGwi2N6RcpspaMiJVRvZxBrPJqky1MgCLcB/s1600/paisajes%2Bde%2Bensue%25C3%25B1o%2Bnaturaleza%2Blagos%2Bmonta%25C3%25B1as%2By%2Bflores%2B1920x1200px%2B%25285%2529.jpg" alt="paisaje">
    </div>

    
    <div class="post-icons">
      <div id="commentsSection" class="comments hidden">
  <div class="comments-list" id="commentsList"></div>

  <div class="comment-input">
    <input type="text" id="commentInput" placeholder="Escribe un comentario..." />
    <button id="addCommentBtn">Publicar</button>
  </div>
</div>
  <div class="icons-left">
    <i id="likeBtn" class="fa-regular fa-heart"></i>
    <i id="commentBtn" class="fa-regular fa-comment"></i>
    <i id="shareBtn" class="fa-regular fa-paper-plane"></i>
  </div>
  <div class="icons-right">
    <i id="saveBtn" class="fa-regular fa-bookmark"></i>
  </div>
</div>


    <div class="post-body">
      <p>Liked by <strong>4GeeksAcademy, html5, Web</strong> and <strong>100,000 others</strong></p>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat.
      </p>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
